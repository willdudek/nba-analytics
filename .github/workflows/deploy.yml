name: Deploy to GitHub Pages

on:
  push:
    branches: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
          EVIDENCE_SOURCE__motherduck__token: ${{ secrets.EVIDENCE_SOURCE__MOTHERDUCK__TOKEN }}
        run: |
          npm run sources
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        working-directory: .

      - name: Install dbt
        run: pip install dbt-duckdb
        working-directory: .

      - name: Generate dbt docs
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.EVIDENCE_SOURCE__MOTHERDUCK__TOKEN }}
        run: |
          cd ../nba_dbt
          dbt docs generate
        working-directory: .

      - name: Copy dbt docs to build output
        run: |
          mkdir -p dashboard/build/nba-analytics/docs
          cp nba_dbt/target/index.html dashboard/build/nba-analytics/docs/
          cp nba_dbt/target/manifest.json dashboard/build/nba-analytics/docs/
          cp nba_dbt/target/catalog.json dashboard/build/nba-analytics/docs/
        working-directory: .

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dashboard/build/nba-analytics'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4